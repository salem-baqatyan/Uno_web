<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO! Pro - Playing</title>
    <style>
        /* --- الأساسيات (مأخوذة من اللوبي لضمان التطابق) --- */
        :root {
            --bg-dark: #000000;
            --arena-bg: #111111;
            --uno-red: #ff5555;
            --uno-blue: #5555ff;
            --uno-green: #55aa55;
            --uno-yellow: #ffaa00;
            --text-gray: #aaaaaa;
            --mobile-max-width: 450px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            margin: 0; background-color: var(--bg-dark); color: white; 
            display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; 
        }

        .mobile-wrapper {
            width: 100%; max-width: var(--mobile-max-width); height: 100dvh; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        /* --- 1. App Bar (نفس اللوبي بالضبط) --- */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px; flex-shrink: 0; z-index: 100;
        }
        .top-left, .top-right { display: flex; gap: 8px; align-items: center; }
        .top-timer { 
            color: white; font-size: 1.5rem; font-weight: 900; font-family: 'Courier New', Courier, monospace; 
            position: absolute; left: 50%; transform: translateX(-50%); 
        }
        .icon-circle { 
            width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; border: 0.5px solid white; cursor: pointer; color: white; 
        }
        .btn-pill { 
            background: rgba(255,255,255,0.1); border: 1px solid #444; padding: 6px 12px; 
            border-radius: 20px; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; cursor: pointer; color: white; 
        }

        /* --- 2. Arena (المركز) --- */
        .game-area {
            flex: 1; position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }

        .arena-center {
            width: 180px; height: 180px; background: rgba(255,255,255,0.03);
            border-radius: 50%; border: 2px dashed rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; gap: 15px;
            position: relative;
        }

        /* اتجاه اللعب (دوران حول الأرينا) */
        .play-direction {
            position: absolute; width: 220px; height: 220px;
            border: 2px solid transparent; border-top: 2px solid var(--uno-green);
            border-radius: 50%; animation: rotate-cw 10s linear infinite;
            pointer-events: none;
        }
        .play-direction.ccw { animation: rotate-ccw 10s linear infinite; border-top-color: var(--uno-red); }

        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .deck-pile, .discard-pile {
            width: 70px; height: 100px; border-radius: 8px; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s;
        }

        .deck-pile { 
            background: linear-gradient(135deg, #222 0%, #000 100%); 
            border: 2px solid #444; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        .deck-pile::before { content: "UNO"; font-weight: 900; color: #333; font-size: 0.8rem; }

        .discard-pile { background: white; border: 2px solid #fff; }

        /* --- 3. Players Layout (توزيع اللاعبين) --- */
        .players-container {
            position: absolute; inset: 0; pointer-events: none;
        }

        .player-seat {
            position: absolute; width: 80px; display: flex; flex-direction: column;
            align-items: center; pointer-events: auto; transition: all 0.5s ease;
        }

        /* التصميم الموحد لإطارات اللاعبين (نفس اللوبي) */
        .avatar-wrap {
            position: relative; width: 50px; height: 50px; border-radius: 50%;
            padding: 2px; border: 2px solid #fff; background: #333;
        }
        .avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .player-name {
            background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 5px;
            font-size: 0.65rem; margin-top: -8px; z-index: 2; white-space: nowrap;
            border: 1px solid transparent;
        }

        .card-count-badge {
            position: absolute; top: -5px; right: -5px;
            background: #ffaa00; color: black; font-weight: bold;
            font-size: 0.7rem; width: 20px; height: 20px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* تمييز الدور والتوهج */
        .is-turn .avatar-wrap {
            box-shadow: 0 0 15px #7ed321, 0 0 30px #7ed321;
            border-color: #7ed321; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* تمييز "أنت" */
        .is-me .player-name { border-color: #7ed321; color: #7ed321; font-weight: bold; }

        /* --- 4. Your Hand (أسفل الشاشة) --- */
        .bottom-controls {
            height: 160px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; border-top: 1px solid #333; position: relative;
        }

        .my-hand {
            width: 100%; display: flex; justify-content: center; align-items: flex-end;
            height: 90%; gap: -20px; overflow-x: auto; padding: 10px;
            scrollbar-width: none;
        }
        .my-hand::-webkit-scrollbar { display: none; }

/* تحديث استايل الكارت الأساسي */
.card {
    min-width: 65px; height: 95px; border-radius: 8px; 
    border: 3px solid #e0e0e0; position: relative;
    display: flex; justify-content: center; align-items: center;
    box-shadow: -3px 0 10px rgba(0,0,0,0.5); transition: 0.2s;
    cursor: pointer; overflow: hidden; margin-left: -25px;
}

/* العناصر الداخلية للبطاقة */
.inner-oval {
    width: 115%; height: 75%; background-color: white;
    border-radius: 50%; transform: rotate(-45deg);
    position: absolute; display: flex; justify-content: center; align-items: center; z-index: 1;
}
.symbol { font-weight: bold; transform: rotate(45deg); z-index: 2; font-size: 35px; }
.corner-number { position: absolute; font-size: 10px; font-weight: bold; color: white; z-index: 2; }
.top-left { top: 2px; left: 2px; }
.bottom-right { bottom: 2px; right: 2px;}

/* ألوان البطاقات */
.red { background-color: #ff5555; } .red .symbol { color: #ff5555; }
.blue { background-color: #5555ff; } .blue .symbol { color: #5555ff; }
.yellow { background-color: #ffaa00; } .yellow .symbol { color: #ffaa00; }
.green { background-color: #55aa55; } .green .symbol { color: #55aa55; }
.wild { background-color: #111; }
.wild .inner-oval { background: linear-gradient(45deg, #ff5555 25%, #5555ff 25%, #5555ff 50%, #ffaa00 50%, #ffaa00 75%, #55aa55 75%); }
.wild .symbol { color: white; font-size: 18px; }

.card:hover { transform: translateY(-20px); z-index: 100 !important; }
#currentCard .card:hover { 
    transform: none !important; 
    z-index: 1 !important; /* أو أي قيمة تناسب تنسيقك */
}
        .uno-btn {
            position: absolute; right: 15px; top: -30px;
            width: 60px; height: 60px; background: radial-gradient(#ff0000, #990000);
            border-radius: 50%; border: 3px solid #fff; color: white;
            font-weight: 900; font-size: 0.7rem; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .uno-btn:active { transform: scale(0.9); }

        /* --- 5. استايلات التدرجات لكل خانة (نفس اللوبي) --- */
        .slot-0 .avatar-wrap { background: linear-gradient(135deg, #7b241c, #e74c3c); }
        .slot-1 .avatar-wrap { background: linear-gradient(135deg, #154360, #3498db); }
        .slot-2 .avatar-wrap { background: linear-gradient(135deg, #145a32, #2ecc71); }
        .slot-3 .avatar-wrap { background: linear-gradient(135deg, #7e5109, #f1c40f); }
        .slot-4 .avatar-wrap { background: linear-gradient(135deg, #6e2c00, #e67e22); }
        .slot-5 .avatar-wrap { background: linear-gradient(135deg, #4a235a, #9b59b6); }
        .slot-6 .avatar-wrap { background: linear-gradient(135deg, #641e16, #ec407a); }
        .slot-7 .avatar-wrap { background: linear-gradient(135deg, #0b5345, #00ced1); }
        .slot-8 .avatar-wrap { background: linear-gradient(135deg, #1d8348, #adff2f); }
        .slot-9 .avatar-wrap { background: linear-gradient(135deg, #1b2631, #2471a3); }
/* --- تحسينات التوهج والحدود --- */

/* 1. التوهج للاعب الذي عنده الدور (يشمل الصورة والنص) */
.player-seat.is-turn {
    filter: drop-shadow(0 0 10px #7ed321) drop-shadow(0 0 5px #7ed321);
    z-index: 100;
}

/* 2. الأفاتار (دائماً بحدود بيضاء مثل البقية) */
.avatar-wrap {
    position: relative;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    padding: 2px;
    border: 2px solid #fff; /* حدود بيضاء ثابتة */
    background: #333;
    z-index: 2;
}

/* 3. مربع نص الاسم بحدود بيضاء */
.player-name {
    background: rgba(0,0,0,0.9);
    padding: 2px 10px;
    border-radius: 5px;
    font-size: 0.65rem;
    margin-top: -5px; /* تداخل بسيط لضمان الاتصال بصرياً */
    z-index: 3;
    white-space: nowrap;
    border: 1px solid #ffffff; /* حدود بيضاء لمربع النص */
    color: white;
}

/* 4. تمييز "أنت" (تغيير لون النص فقط داخل المربع) */
.player-seat.is-me .player-name {
    color: #7ed321;
    font-weight: bold;
    border: 1.5px solid #ffffff; /* التأكيد على الحدود البيضاء */
}

.me-tag {
    color: #7ed321;
    margin-right: 2px;
}

/* إلغاء أي أنيميشن نبض تماماً */
.is-turn, .is-turn .avatar-wrap {
    animation: none !important;
}

    </style>
</head>
<body>

<div class="mobile-wrapper">
    <div class="top-bar">
        <div class="top-left">
            <div class="icon-circle">
                <span id="playerCount" style="font-size:0.8rem;font-weight:bold;margin-left:2px;">0</span> 👤
            </div> 
            <div class="btn-pill" id="roomDisplay">🔗 الغرفة</div>
        </div>
        <div class="top-timer" id="gameTimer"></div>
        <div class="top-right">
            <div class="btn-pill">📜القواعد</div>
            <div class="icon-circle">⚙️</div>
        </div>
    </div>

    <div class="game-area">
        <div class="players-container" id="playersContainer">
            </div>

        <div class="arena-center">
            <div class="play-direction" id="directionIndicator"></div>
            <div class="deck-pile" id="deckPile"></div>
            <div class="discard-pile" id="currentCard">
                <div class="card green" style="margin:0; width:100%; height:100%; border-width:3px;">
                    <div class="corner-number top-left">7</div>
                    <div class="inner-oval"><span class="symbol">7</span></div>
                    <div class="corner-number bottom-right">7</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-controls">
        <div class="uno-btn">UNO!</div>
        <div class="my-hand" id="myHand">
            <div class="card red" style="z-index:1">
                <div class="corner-number top-left">5</div>
                <div class="inner-oval"><span class="symbol">5</span></div>
                <div class="corner-number bottom-right">5</div>
            </div>
            <div class="card blue" style="z-index:2">
                <div class="corner-number top-left">⊘</div>
                <div class="inner-oval"><span class="symbol">⊘</span></div>
                <div class="corner-number bottom-right">⊘</div>
            </div>
            <div class="card yellow" style="z-index:3">
                <div class="corner-number top-left">+2</div>
                <div class="inner-oval"><span class="symbol" style="font-size:25px">+2</span></div>
                <div class="corner-number bottom-right">+2</div>
            </div>
            <div class="card green" style="z-index:4">
                <div class="corner-number top-left">↻</div>
                <div class="inner-oval"><span class="symbol">↻</span></div>
                <div class="corner-number bottom-right">↻</div>
            </div>
            <div class="card wild" style="z-index:5">
                <div class="corner-number top-left">C</div>
                <div class="inner-oval"><span class="symbol">Color</span></div>
                <div class="corner-number bottom-right">C</div>
            </div>
            <div class="card wild" style="z-index:6">
                <div class="corner-number top-left">+4</div>
                <div class="inner-oval"><span class="symbol">+4</span></div>
                <div class="corner-number bottom-right">+4</div>
            </div>
            <div class="card" style="z-index:7; background-color: #ffffff; border-color: #dcdcdc;"></div>
        </div>
    </div>
</div>

<script>

function layoutPlayers(playersData, myId, currentTurnId) {
    const container = document.getElementById('playersContainer');
    container.innerHTML = '';
    
    // تحويل الكائن إلى مصفوفة لسهولة التعامل معها
    const playersArray = Object.values(playersData);
    const totalPlayers = playersArray.length;
    
    // إعدادات التوزيع الأصلية الخاصة بك
    const configs = {
        1:  { right: 0, top: 0, left: 0 }, // حالة لاعب واحد (اختبار)
        2:  { right: 1, top: 0, left: 1 },
        3:  { right: 1, top: 1, left: 1 },
        4:  { right: 2, top: 0, left: 2 },
        5:  { right: 2, top: 1, left: 2 },
        6:  { right: 2, top: 2, left: 2 },
        7:  { right: 2, top: 3, left: 2 },
        8:  { right: 3, top: 2, left: 3 },
        9:  { right: 3, top: 3, left: 3 },
        10: { right: 4, top: 2, left: 4 }
    };

    const config = configs[totalPlayers] || configs[7];
    let positions = [];

    // التوزيع عكس عقارب الساعة (نفس ترتيبك الأخير)
    // 1. اليسار: من الأسفل صعوداً
    for(let i = config.left - 1; i >= 0; i--) {
        positions.push({ side: 'left', top: (100 / (config.left + 1)) * (i + 1) });
    }
    // 2. الأعلى: من اليسار إلى اليمين
    for(let i = 0; i < config.top; i++) {
        positions.push({ side: 'top', left: (100 / (config.top + 1)) * (i + 1) });
    }
    // 3. اليمين: من الأعلى نزولاً
    for(let i = 0; i < config.right; i++) {
        positions.push({ side: 'right', top: (100 / (config.right + 1)) * (i + 1) });
    }

    // رسم اللاعبين بناءً على البيانات القادمة
    playersArray.forEach((player, idx) => {
        if (!positions[idx]) return; // حماية في حال زاد عدد اللاعبين عن المواقع

        const isMe = (player.id === myId); 
        const hasTurn = (player.id === currentTurnId);
        const pos = positions[idx];
        
        const seat = document.createElement('div');
        // استخدام slot القادم من البيانات للألوان، و is-me / is-turn للتمييز
        seat.className = `player-seat ${player.slot} ${isMe ? 'is-me' : ''} ${hasTurn ? 'is-turn' : ''}`;
        
        let style = "";
        if(pos.side === 'right') style = `top: ${pos.top}%; right: 15px; transform: translateY(-50%);`;
        if(pos.side === 'left')  style = `top: ${pos.top}%; left: 15px; transform: translateY(-50%);`;
        if(pos.side === 'top')   style = `top: 20px; left: ${pos.left}%; transform: translateX(-50%);`;
        
        seat.style.cssText = style;

        seat.innerHTML = `
            <div class="avatar-wrap">
                <img src="${player.avatar}">
                <div class="card-count-badge">${player.handCount}</div>
            </div>
            <div class="player-name">
                ${player.name} ${isMe ? '<span class="me-tag">(أنت)</span>' : ''}
            </div>
        `;
        container.appendChild(seat);
    });

    // تحديث عداد اللاعبين في الأعلى (اختياري)
    const countEl = document.getElementById('playerCount');
    if(countEl) countEl.innerText = totalPlayers;
}

// --- مثال لكيفية تشغيل الدالة ببياناتك ---
const dataFromDB = {
    "players": {
        "mfntf9": {
            "avatar": "img/avatar/pizza_guy.webp",
            "id": "mfntf9",
            "name": "abdo",
            "slot": "slot-0",
            "handCount": 7
        },
        "xg4yr5": {
            "avatar": "img/avatar/snowman.webp",
            "id": "xg4yr5",
            "name": "salem",
            "slot": "slot-1",
            "handCount": 5
        }
    }
};

// تشغيل: اللاعب هو "abdo" والدور حالياً على "salem"
layoutPlayers(dataFromDB.players, "mfntf9", "xg4yr5");

</script>
</body>
</html>
