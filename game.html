<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="img/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UNO! Pro">
    <title>UNO! Pro - Game</title>
    <style>
        /* --- الأساسيات --- */
        :root {
            --bg-dark: #000000;
            --arena-bg: #111111;
            --uno-red: #ff5555;
            --uno-blue: #5555ff;
            --uno-green: #55aa55;
            --uno-yellow: #ffaa00;
            --mobile-max-width: 450px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; background-color: var(--bg-dark); color: white; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }

        .mobile-wrapper {
            width: 100%; max-width: var(--mobile-max-width); height: 100dvh; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        /* --- 1. App Bar --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; flex-shrink: 0; z-index: 100; }
        .top-left, .top-right { display: flex; gap: 8px; align-items: center; }
        .top-timer { color: white; font-size: 1.5rem; font-weight: 900; font-family: 'Courier New', monospace; position: absolute; left: 50%; transform: translateX(-50%); }
        .icon-circle { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 0.5px solid white; cursor: pointer; color: white; }
        .btn-pill { background: rgba(255,255,255,0.1); border: 1px solid #444; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; display: flex; align-items: center; gap: 5px; cursor: pointer; color: white; }

        /* --- 2. Arena --- */
        .game-area { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .arena-center { width: 180px; height: 180px; background: rgba(255,255,255,0.03); border-radius: 50%; border: 2px dashed rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        
        .play-direction { position: absolute; width: 220px; height: 220px; border: 2px solid transparent; border-top: 2px solid white; border-radius: 50%; animation: rotate-cw 10s linear infinite; pointer-events: none; }
        .play-direction.ccw { animation: rotate-ccw 10s linear infinite; }
        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        .deck-pile, .discard-pile { width: 70px; height: 100px; border-radius: 8px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .deck-pile { background: linear-gradient(135deg, #222 0%, #000 100%); border: 2px solid #444; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .deck-pile::before { content: "UNO"; font-weight: 900; color: #333; font-size: 0.8rem; }
        .discard-pile { background: white; border: 2px solid #fff; overflow: hidden; }

        /* --- 3. Players Layout --- */
        .players-container { position: absolute; inset: 0; pointer-events: none; }
        .player-seat { position: absolute; width: 80px; display: flex; flex-direction: column; align-items: center; pointer-events: auto; transition: all 0.5s ease; }
        .avatar-wrap { position: relative; width: 50px; height: 50px; border-radius: 50%; padding: 2px; border: 2px solid #fff; background: #333; z-index: 2; }
        .avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .player-name { background: rgba(0,0,0,0.9); padding: 2px 10px; border-radius: 5px; font-size: 0.65rem; margin-top: -5px; z-index: 3; white-space: nowrap; border: 1px solid #ffffff; color: white; }
        .card-count-badge { position: absolute; top: -5px; right: -5px; background: #ffaa00; color: black; font-weight: bold; font-size: 0.7rem; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .player-seat.is-turn { filter: drop-shadow(0 0 10px #7ed321) drop-shadow(0 0 5px #7ed321); z-index: 100; }
        .player-seat.is-me .player-name { color: #7ed321; font-weight: bold; }

        /* --- 4. Your Hand & Controls --- */
        .bottom-controls { height: 160px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; padding: 10px; border-top: 1px solid #333; position: relative; }
        .my-hand { width: 100%; display: flex; justify-content: center; align-items: flex-end; height: 90%; gap: -20px; overflow-x: auto; padding: 10px; scrollbar-width: none; }
        .my-hand::-webkit-scrollbar { display: none; }

        /* Stacking UI (تنبيه التراكم) */
        .stacking-alert {
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%);
            background: rgba(20, 0, 0, 0.95); border: 2px solid var(--uno-red);
            padding: 8px 15px; border-radius: 20px; display: none; /* مخفي افتراضياً */
            align-items: center; gap: 12px; box-shadow: 0 4px 15px rgba(255,0,0,0.4); z-index: 150;
        }
        .stacking-alert span { color: white; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
        .accept-stack-btn {
            background-color: var(--uno-red); color: white; border: 1px solid #fff;
            padding: 6px 12px; border-radius: 10px; font-weight: bold; font-size: 0.75rem;
            cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .accept-stack-btn:active { transform: scale(0.95); }

        #colorPicker { position: absolute; top: -70px; background: rgba(0,0,0,0.9); padding: 10px 20px; border-radius: 15px; border: 1px solid #444; display: none; gap: 10px; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        .color-btn { width: 45px; height: 45px; border-radius: 10px; border: 2px solid white; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .color-btn:active { transform: scale(0.9); }

        /* --- 5. البطاقات --- */
        .card { min-width: 65px; width: 65px; height: 95px; border-radius: 8px; border: 3px solid #e0e0e0; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: -3px 0 10px rgba(0,0,0,0.5); transition: 0.2s; cursor: pointer; overflow: hidden; flex-shrink: 0;}
        .discard-pile .card { margin: 0; width: 100%; height: 100%; border-width: 3px; }
        .inner-oval { width: 115%; height: 75%; background-color: white; border-radius: 50%; transform: rotate(-45deg); position: absolute; display: flex; justify-content: center; align-items: center; z-index: 1; }
        .symbol { font-weight: bold; transform: rotate(45deg); z-index: 2; font-size: 35px; }
        .corner-number { position: absolute; font-size: 10px; font-weight: bold; color: white; z-index: 2; }
        .top-left { top: 2px; left: 2px; } .bottom-right { bottom: 2px; right: 2px;}

        .red { background-color: var(--uno-red); } .red .symbol { color: var(--uno-red); }
        .blue { background-color: var(--uno-blue); } .blue .symbol { color: var(--uno-blue); }
        .yellow { background-color: var(--uno-yellow); } .yellow .symbol { color: var(--uno-yellow); }
        .green { background-color: var(--uno-green); } .green .symbol { color: var(--uno-green); }
        .wild { background-color: #111; } .wild .inner-oval { background: linear-gradient(45deg, var(--uno-red) 25%, var(--uno-blue) 25%, var(--uno-blue) 50%, var(--uno-yellow) 50%, var(--uno-yellow) 75%, var(--uno-green) 75%); } .wild .symbol { color: white; font-size: 18px; }

        /* ابحث عن قسم الألوان وأضف هذا التنسيق */
        .eraser { background-color: #ffffff; border-color: #dcdcdc; }
        .eraser .inner-oval { background-color: #ffffff; } /* تباين بسيط للداخل */
        .eraser .symbol, .eraser .corner-number { display: none; } /* إخفاء أي رموز */

        .my-hand .card:hover { transform: translateY(-20px); z-index: 100 !important; }
        
        .uno-btn { position: absolute; right: 15px; top: -30px; width: 60px; height: 60px; background: radial-gradient(#ff0000, #990000); border-radius: 50%; border: 3px solid #fff; color: white; font-weight: 900; font-size: 0.7rem; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s; }
        
        /* تدرجات Slots */
        .slot-0 .avatar-wrap { background: linear-gradient(135deg, #7b241c, #e74c3c); } .slot-1 .avatar-wrap { background: linear-gradient(135deg, #154360, #3498db); } .slot-2 .avatar-wrap { background: linear-gradient(135deg, #145a32, #2ecc71); } .slot-3 .avatar-wrap { background: linear-gradient(135deg, #7e5109, #f1c40f); } .slot-4 .avatar-wrap { background: linear-gradient(135deg, #6e2c00, #e67e22); } .slot-5 .avatar-wrap { background: linear-gradient(135deg, #4a235a, #9b59b6); } .slot-6 .avatar-wrap { background: linear-gradient(135deg, #641e16, #ec407a); } .slot-7 .avatar-wrap { background: linear-gradient(135deg, #0b5345, #00ced1); } .slot-8 .avatar-wrap { background: linear-gradient(135deg, #1d8348, #adff2f); } .slot-9 .avatar-wrap { background: linear-gradient(135deg, #1b2631, #2471a3); }

        /* --- إشعارات Toast --- */
#toastContainer {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
.toast-msg {
    background: rgba(0, 0, 0, 0.85); border: 2px solid var(--uno-yellow);
    color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold;
    font-size: 0.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    animation: fade-in-out 4s forwards; text-align: center; white-space: nowrap;
}
@keyframes fade-in-out {
    0% { opacity: 0; transform: translateY(-20px); }
    10% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-20px); }
}

/* --- النبض الأحمر لمن لديه بطاقة واحدة --- */
@keyframes pulse-red {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.8); }
    70% { transform: scale(1.3); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
}
.uno-danger {
    background-color: red !important; color: white !important;
    animation: pulse-red 1s infinite; border: 1px solid white;
}
.player-seat .avatar-wrap { cursor: pointer; /* جعل الأفاتار قابل للضغط */ }

/* --- Custom Modal --- */
.custom-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
    display: none; justify-content: center; align-items: center; z-index: 10000;
}
.custom-modal {
    background: #111; border: 2px solid var(--uno-yellow); border-radius: 15px;
    padding: 20px; width: 85%; max-width: 320px; text-align: center; color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.9); transform: scale(0.9); animation: pop-in 0.2s forwards;
}
@keyframes pop-in { to { transform: scale(1); } }
.custom-modal h3 { margin-top: 0; color: var(--uno-red); font-size: 1rem; }
.custom-modal p { font-size: 0.7rem; line-height: 1.5; margin-bottom: 20px; }
.custom-modal-actions { display: flex; justify-content: space-around; gap: 10px; }
.custom-modal-actions button {
    flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s;
}
.custom-modal-actions button:active { transform: scale(0.95); }
.btn-cancel { background: #444; color: white; }
.btn-confirm { background: var(--uno-red); color: white; border: 1px solid #fff; }
/* --- 6. لوحة النتائج واللاعب المنسحب --- */
.leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; color: white; }
.leaderboard-table th, .leaderboard-table td { border-bottom: 1px solid #444; padding: 10px; text-align: center; }
.leaderboard-table th { color: var(--uno-yellow); }
.finished-player { filter: grayscale(100%) opacity(0.5); pointer-events: none; }
.is-me-row {
    background-color: rgba(255, 215, 0, 0.15); /* لون أصفر خفيف */
    color: var(--uno-yellow);
    font-weight: bold;
}
/* --- تنسيقات عداد لوحة النتائج --- */
.timer-container {
    position: relative;
    width: 60px;
    height: 60px;
    margin: 15px auto 0;
}
.timer-svg {
    width: 60px;
    height: 60px;
    transform: rotate(-90deg);
}
.timer-circle-bg {
    fill: none;
    stroke: rgba(255, 255, 255, 0.1);
    stroke-width: 4;
}
.timer-circle-fg {
    fill: none;
    stroke: var(--uno-yellow, #ffc107);
    stroke-width: 4;
    stroke-dasharray: 176;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
}
#countdown-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: bold;
    font-size: 1.2rem;
    color: white;
}
</style>
</head>

<script src="/strings/seat_positions.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, update, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
import { serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAiQtfrXCU_Z3-N_UczLWXJKff4QJ5pGFY",
    authDomain: "uno-4ed20.firebaseapp.com",
    databaseURL: "https://uno-4ed20-default-rtdb.firebaseio.com",
    projectId: "uno-4ed20",
    storageBucket: "uno-4ed20.firebasestorage.app",
    messagingSenderId: "246636486248",
    appId: "1:246636486248:web:aaab01dccbb45dd9b665dd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const urlParams = new URLSearchParams(window.location.search);
const roomId = urlParams.get('r');
const playerId = urlParams.get('p');

const myPlayerRef = ref(db, `rooms/${roomId}/players/${playerId}`);

// نظام نبضات القلب الحقيقي لمراقبة الاتصال
const connectedRef = ref(db, ".info/connected");
onValue(connectedRef, (snap) => {
    if (snap.val() === true) {
        // بمجرد الاتصال، نربط السيرفر بحذف حالتنا لو أغلقنا المتصفح
        onDisconnect(myPlayerRef).update({
            isDisconnected: true,
            disconnectTime: serverTimestamp()
        });

        // ونعلن فوراً أننا متصلون الآن
        update(myPlayerRef, {
            isDisconnected: false,
            disconnectTime: null
        });
    }
});

const gameRef = ref(db, `rooms/${roomId}/game`);
const playersRef = ref(db, `rooms/${roomId}/players`);
const settingsRef = ref(db, `rooms/${roomId}/settings`);

let gameState = null;
let playersData = null;
let roomSettings = {};
let activePlayersList = [];
let myHand = [];
let pendingWildCard = null; 

const valueMap = { "Zero":"0", "One":"1", "Two":"2", "Three":"3", "Four":"4", "Five":"5", "Six":"6", "Seven":"7", "Eight":"8", "Nine":"9", "Skip":"⊘", "Reverse":"↻", "DrawTwo":"+2" };

function parseCard(cardStr) {
    if (cardStr === "wildColor") return { color: "wild", value: "C", symbol: "Color", isWild: true };
    if (cardStr === "wildDrawFour") return { color: "wild", value: "+4", symbol: "+4", isWild: true };
    if (cardStr === "Eraser") return { color: "eraser", value: "", symbol: "", isWild: true, isEraser: true };

    const colors = ["red", "blue", "green", "yellow"];
    for (let c of colors) {
        if (cardStr.startsWith(c)) return { color: c, value: valueMap[cardStr.replace(c, "")], symbol: valueMap[cardStr.replace(c, "")], isWild: false };
    }
    return { color: "unknown", value: "?", symbol: "?" };
}

function createCardElement(cardStr, zIndex, onClickAction) {
    const card = parseCard(cardStr);
    const div = document.createElement('div');
    div.className = `card ${card.color}`;
    div.style.zIndex = zIndex;
    div.innerHTML = `<div class="corner-number top-left">${card.value}</div><div class="inner-oval"><span class="symbol">${card.symbol}</span></div><div class="corner-number bottom-right">${card.value}</div>`;
    if (onClickAction) div.onclick = onClickAction;
    return div;
}

function shuffleArray(array) {
    let newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

function extractCardsToDraw(count, currentDeck, currentDiscard) {
    let drawnCards = [];
    let deck = [...(currentDeck || [])];
    let discard = [...(currentDiscard || [])];

    for (let i = 0; i < count; i++) {
        if (deck.length === 0) {
            if (discard.length <= 1) break;
            const topCard = discard.pop();
            deck = shuffleArray(discard);
            discard = [topCard];
        }
        drawnCards.push(deck.pop());
    }
    return { drawnCards, deck, discard };
}

function applyDynamicMargins() {
    const cards = document.querySelectorAll("#myHand .card");
    const count = cards.length;
    
    if (count <= 1) {
        if (cards[0]) cards[0].style.margin = "0";
        return;
    }

    const cardWidth = 65;
    const targetDistance = 425;
    let idealMargin = 0;

    if (count <= 10) {
        idealMargin = -12.8;
    } else {
        idealMargin = (targetDistance - (count * cardWidth)) / ((count - 1) * 2);
    }

    cards.forEach(card => {
        card.style.marginLeft = `${idealMargin}px`;
        card.style.marginRight = `${idealMargin}px`;
    });
}

function renderGame() {
    if (!gameState || !playersData) return;

    const currentTurnId = gameState.turnState.currentTurnId;
    window.layoutPlayers(playersData, playerId, currentTurnId);

    const directionEl = document.getElementById('directionIndicator');
    const topCardStr = gameState.discardPile[gameState.discardPile.length - 1];
    const topCard = parseCard(topCardStr);
    const activeColor = gameState.turnState.selectedColor || topCard.color;
    
    directionEl.className = `play-direction ${gameState.turnState.direction === -1 ? 'ccw' : ''}`;
    directionEl.style.borderTopColor = `var(--uno-${activeColor})`;

    const discardContainer = document.getElementById('currentCard');
    discardContainer.innerHTML = '';
    discardContainer.appendChild(createCardElement(topCardStr, 1, null));

    const handContainer = document.getElementById('myHand');
    handContainer.innerHTML = '';
    myHand.forEach((cardStr, index) => {
        const action = (currentTurnId === playerId) ? () => handlePlayCard(cardStr, index) : null;
        handContainer.appendChild(createCardElement(cardStr, index + 1, action));
    });

    const stackingAlert = document.getElementById('stackingAlert');
    const drawStack = gameState.turnState.drawStack || 0;
    const isStackingEnabled = roomSettings.stacking !== false;

    if (currentTurnId === playerId && drawStack > 0 && isStackingEnabled) {
        stackingAlert.style.display = 'flex';
        document.getElementById('stackingAmount').innerText = drawStack;
    } else {
        stackingAlert.style.display = 'none';
    }
    applyDynamicMargins();
}

window.selectColor = function(color) {
    if (!pendingWildCard) return;
    const { cardStr, cardIndex } = pendingWildCard;
    document.getElementById('colorPicker').style.display = 'none';
    executeMove(cardStr, cardIndex, color);
    pendingWildCard = null;
};

function getNextPlayerId(skip, currentDirection) {
    let idx = activePlayersList.findIndex(p => p.id === gameState.turnState.currentTurnId);
    let foundCount = 0;
    let targetCount = skip ? 2 : 1;
    let nextIdx = idx;
    
    while (foundCount < targetCount) {
        nextIdx = (nextIdx + currentDirection) % activePlayersList.length;
        if (nextIdx < 0) nextIdx += activePlayersList.length;
        
        if (!activePlayersList[nextIdx].finishedRank) {
            foundCount++;
        }
        
        if (nextIdx === idx) break; 
    }
    return activePlayersList[nextIdx].id;
}

function isValidMove(playedStr) {
    const topStr = gameState.discardPile[gameState.discardPile.length - 1];
    const top = parseCard(topStr);
    const played = parseCard(playedStr);
    const activeCol = gameState.turnState.selectedColor || top.color;
    const drawStack = gameState.turnState.drawStack || 0;

    if (played.isEraser) {
        return drawStack > 0;
    }

    if (drawStack > 0) {
        return (played.value === "+2" || played.value === "+4");
    }

    return played.isWild || played.color === activeCol || played.value === top.value;
}

async function handlePlayCard(cardStr, cardIndex) {
    if (!isValidMove(cardStr)) return showToast("لا يمكنك لعب هذه البطاقة!");

    const card = parseCard(cardStr);
    if (card.isWild) {
        pendingWildCard = { cardStr, cardIndex };
        document.getElementById('colorPicker').style.display = 'flex';
    } else {
        executeMove(cardStr, cardIndex, card.color);
    }
}

async function executeMove(cardStr, cardIndex, chosenColor) {
    document.getElementById('colorPicker').style.display = 'none'; 
    
    const card = parseCard(cardStr);    
    // تعريف دقيق لبطاقات الأكشن
    const isActionCard = card.value === "⊘" || 
                         card.value === "↻" || 
                         card.value === "+2" || 
                         card.value === "+4" || 
                         card.type === "wildColor" || 
                         card.isEraser;

    // القيد: لا يسمح بأن تكون البطاقة الأخيرة أكشن (فقط إذا كان النظام ليس نقاط)
    const isPointsMode = roomSettings.points === true;
    if (myHand.length === 1 && isActionCard && !isPointsMode) {
        return showToast("🚫 لا يمكنك الفوز ببطاقة أكشن، يجب أن تكون بطاقتك الأخيرة رقماً.");
    }

    let nextDirection = gameState.turnState.direction;
    let skipNext = false;
    let addedStack = 0;
    const isStackingEnabled = roomSettings.stacking !== false;
    const playersStillPlaying = activePlayersList.filter(p => !p.finishedRank).length;
    let newDrawStack = (gameState.turnState.drawStack || 0);
    
    // منطق بطاقات الأكشن
    if (card.isEraser) {
        newDrawStack = 0; 
    } else {
        if (card.value === "↻") {
            if (playersStillPlaying === 2) {
                skipNext = true;
            } else {
                nextDirection *= -1;
            }
        } else if (card.value === "⊘") {
            skipNext = true;
        } else if (card.value === "+2") {
            addedStack = 2;
        } else if (card.value === "+4") {
            addedStack = 4;
        }
        newDrawStack += addedStack;
    }

    // تحديث المصفوفات المحلية قبل الرفع للسيرفر
    let deck = [...(gameState.deck || [])];
    let discardPile = [...(gameState.discardPile || [])];
    
    // إزالة البطاقة من اليد
    myHand.splice(cardIndex, 1);
    discardPile.push(cardStr);

    const updates = {};
    let isGameOver = false;
    const now = Date.now();

    // 1. إذا أنهى اللاعب الحالي أوراقه (هو فائز حالياً)
    if (myHand.length === 0) {
        if (isPointsMode) {
            isGameOver = true;
        } else {
            const currentFinishedCount = activePlayersList.filter(p => p.finishedRank).length;
            const myRank = currentFinishedCount + 1;
            
            updates[`rooms/${roomId}/players/${playerId}/finishedRank`] = myRank;
            // تسجيل وقت النهاية للفائز فقط
            if (gameState.startTime) {
                updates[`rooms/${roomId}/players/${playerId}/finishTime`] = now - gameState.startTime;
            }

            // التحقق هل انتهت اللعبة (بقي لاعب واحد فقط)
            if (activePlayersList.length - myRank <= 1) {
                isGameOver = true;
                
                // تحديد اللاعب الخاسر (الأخير) لإعطائه رتبة بدون وقت
                const loser = activePlayersList.find(p => p.id !== playerId && !p.finishedRank);
                if (loser) {
                    updates[`rooms/${roomId}/players/${loser.id}/finishedRank`] = activePlayersList.length;
                    // ملاحظة: لا نضع finishTime للخاسر لكي تظهر علامة ~
                }
            }
        }
    }

    // تجهيز تحديثات اللاعب الحالي
    updates[`rooms/${roomId}/players/${playerId}/hand`] = myHand;
    updates[`rooms/${roomId}/players/${playerId}/handCount`] = myHand.length;
    updates[`rooms/${roomId}/players/${playerId}/movesCount`] = (playersData[playerId].movesCount || 0) + 1;

    // حساب اللاعب التالي
    let nextPlayerId = getNextPlayerId(skipNext, nextDirection);

    // التعامل مع سحب البطاقات الإجباري (إذا كان التراكم معطلاً)
    if (addedStack > 0 && !isStackingEnabled) {
        const targetPlayerId = nextPlayerId; // اللاعب الذي عليه الدور الآن هو من سيسحب
        const drawRes = extractCardsToDraw(newDrawStack, deck, discardPile);
        deck = drawRes.deck;
        discardPile = drawRes.discard;
        
        let targetHand = (playersData[targetPlayerId].hand || []).concat(drawRes.drawnCards);
        updates[`rooms/${roomId}/players/${targetPlayerId}/hand`] = targetHand;
        updates[`rooms/${roomId}/players/${targetPlayerId}/handCount`] = targetHand.length;
        updates[`rooms/${roomId}/players/${targetPlayerId}/saidUno`] = false; 
        
        newDrawStack = 0; // تصفير التراكم بعد السحب
        
        // في حال سحب +2 أو +4 والعدد 2، غالباً يقفز الدور ويعود لك
        nextPlayerId = getNextPlayerId(true, nextDirection);
    }

    updates[`rooms/${roomId}/game/deck`] = deck;
    updates[`rooms/${roomId}/game/discardPile`] = discardPile;

    if (isGameOver) {
        updates[`rooms/${roomId}/game/status`] = 'finished';
    } else {
        const timerSetting = parseInt(roomSettings.timer) || 0;
        const nextExpireAt = timerSetting > 0 ? (Date.now() + (timerSetting * 1000)) : null;

        updates[`rooms/${roomId}/game/turnState`] = {
            currentTurnId: nextPlayerId, 
            direction: nextDirection, 
            selectedColor: chosenColor,
            drawStack: newDrawStack, 
            lastUpdated: serverTimestamp(),
            expireAt: nextExpireAt
        };
    }

    try {
        await update(ref(db), updates);
    } catch (e) {
        console.error("Move update failed:", e);
        showToast("خطأ في الاتصال، حاول مجدداً");
    }
}

onValue(playersRef, (snap) => {
    playersData = snap.val() || {};
    activePlayersList = Object.values(playersData)
        .filter(p => p.slot?.startsWith('slot-'))
        .sort((a, b) => parseInt(a.slot.split('-')[1]) - parseInt(b.slot.split('-')[1]));
        
    if (playersData[playerId]?.hand) myHand = playersData[playerId].hand;
    
    if (gameState && gameState.status !== 'finished') {
        const now = Date.now();
        const isAdmin = (activePlayersList.length > 0 && playerId === activePlayersList[0].id);

        // فلترة اللاعبين المتصلين فعلياً والذين لم ينتهوا بعد
        const onlinePlayers = activePlayersList.filter(p => !p.isDisconnected && !p.finishedRank);

        // 🚨 الحل الذكي لطلبك: لو ما بقي في الروم إلا أنت شغال والآخرين انقطعوا، ننهي القيم فوراً!
        if (onlinePlayers.length === 1 && activePlayersList.length > 1) {
             const updates = {};
             updates[`rooms/${roomId}/game/status`] = 'finished';
             
             // نضع اللاعب المتبقي في المركز الأول
             updates[`rooms/${roomId}/players/${onlinePlayers[0].id}/finishedRank`] = 1;
             
             // تحديث السيرفر ليرى الجميع شاشة النهاية
             update(ref(db), updates);
             showToast("انقطع الخصم! انتهت اللعبة بفوزك 🏆");
             return; 
        }
        
        // فحص الـ 30 ثانية القديم (للرومات التي فيها أكثر من لاعبين)
        activePlayersList.forEach(p => {
            if (p.isDisconnected && p.disconnectTime) {
                const elapsed = Math.floor((now - p.disconnectTime) / 1000);
                
                if (elapsed >= 30 && isAdmin) {
                    handleLeaverLogic(p.id);
                }
            }
        });
    }

    renderGame();
});

let gameTimerInterval = null;

onValue(settingsRef, (snap) => {
    roomSettings = snap.val() || {};
});
onValue(gameRef, (snap) => {
    gameState = snap.val();
    if (!gameState) return;

    const loader = document.getElementById('loadingScreen');
    if (loader) loader.style.display = 'none';

    if (gameState.status === 'finished') {
        if (gameTimerInterval) clearInterval(gameTimerInterval);
        document.getElementById('gameTimer').innerText = ''; 
        showLeaderboard();
    } else {
        renderGame();
        
        const timerSetting = parseInt(roomSettings.timer) || 0;
        if (timerSetting > 0 && gameState.turnState && gameState.turnState.expireAt) {
            startTurnTimer(gameState.turnState.expireAt);
        } else {
            if (gameTimerInterval) clearInterval(gameTimerInterval);
            document.getElementById('gameTimer').innerText = '';
        }
    }
});

function startTurnTimer(expireAt) {
    if (gameTimerInterval) clearInterval(gameTimerInterval);
    const timerElement = document.getElementById('gameTimer');

    gameTimerInterval = setInterval(async () => {
        const now = Date.now();
        const timeLeft = Math.ceil((expireAt - now) / 1000);

        if (timeLeft > 0) {
            timerElement.innerText = `${timeLeft}`;
            if (timeLeft <= 5) {
                timerElement.style.color = '#ff4d4d';
                timerElement.style.fontWeight = 'bold';
            } else {
                timerElement.style.color = 'white';
                timerElement.style.fontWeight = 'normal';
            }
        } else {
            clearInterval(gameTimerInterval);
            timerElement.innerText = `0`;
            
            const isAdmin = (activePlayersList.length > 0 && playerId === activePlayersList[0].id);
            if (isAdmin) {
                await handleTimeoutPenalty(gameState.turnState.currentTurnId);
            }
        }
    }, 1000);
}

async function handleTimeoutPenalty(timedOutPlayerId) {
    let deck = [...(gameState.deck || [])];
    let discardPile = [...(gameState.discardPile || [])];
    const timedOutPlayer = playersData[timedOutPlayerId];
    
    if (!timedOutPlayer) return;

    const currentHand = timedOutPlayer.hand || [];
    const drawStack = gameState.turnState.drawStack || 0;
    
    // تحديد كم سيتم سحبه: إما التراكم الموجود أو بطاقة واحدة كحد أدنى
    const countToDraw = drawStack > 0 ? drawStack : 1;
    
    const drawRes = extractCardsToDraw(countToDraw, deck, discardPile);
    if (drawRes.drawnCards.length === 0) return;
    
    const newHand = currentHand.concat(drawRes.drawnCards);
    const updates = {};
    
    updates[`rooms/${roomId}/game/deck`] = drawRes.deck;
    updates[`rooms/${roomId}/game/discardPile`] = drawRes.discard;
    updates[`rooms/${roomId}/players/${timedOutPlayerId}/hand`] = newHand;
    updates[`rooms/${roomId}/players/${timedOutPlayerId}/handCount`] = newHand.length;
    updates[`rooms/${roomId}/players/${timedOutPlayerId}/saidUno`] = false;
    
    const currentMoves = timedOutPlayer.movesCount || 0;
    updates[`rooms/${roomId}/players/${timedOutPlayerId}/movesCount`] = currentMoves + 1;

    const timerSetting = parseInt(roomSettings.timer) || 0;
    const nextExpireAt = timerSetting > 0 ? (Date.now() + (timerSetting * 1000)) : null;

    // بعد العقوبة، ينتقل الدور للاعب التالي ويصفر التراكم
    const nextPlayerId = getNextPlayerId(false, gameState.turnState.direction);
    
    updates[`rooms/${roomId}/game/turnState`] = {
        currentTurnId: nextPlayerId,
        direction: gameState.turnState.direction,
        selectedColor: gameState.turnState.selectedColor || null,
        drawStack: 0, // 👈 تصفير التراكم دائماً بعد السحب الإجباري
        lastUpdated: serverTimestamp(),
        expireAt: nextExpireAt
    };

    // رسالة توضيحية للجميع
    const reasonMsg = drawStack > 0 
        ? `⏰ انتهى وقت ${timedOutPlayer.name} وسحب تراكم ${drawStack} بطاقات! 🃏`
        : `⏰ انتهى وقت ${timedOutPlayer.name} وتم سحب بطاقة له!`;

    updates[`rooms/${roomId}/game/toastMessage`] = { 
        msg: reasonMsg, 
        time: Date.now() 
    };

    await update(ref(db), updates);
}

async function handleLeaverLogic(leaverId) {
    const updates = {};
    const leaver = playersData[leaverId];
    if (!leaver || leaver.team === "spectators-list") return; 

    let deck = [...(gameState.deck || [])];
    const leaverHand = leaver.hand || [];

    deck = leaverHand.concat(deck);
    updates[`rooms/${roomId}/game/deck`] = deck;

    updates[`rooms/${roomId}/players/${leaverId}/team`] = "spectators-list";
    updates[`rooms/${roomId}/players/${leaverId}/slot`] = null;
    updates[`rooms/${roomId}/players/${leaverId}/hand`] = null;
    updates[`rooms/${roomId}/players/${leaverId}/handCount`] = 0;
    updates[`rooms/${roomId}/players/${leaverId}/finishedRank`] = 999;
    updates[`rooms/${roomId}/players/${leaverId}/isLeaver`] = true;

    const remainingPlayers = activePlayersList.filter(p => p.id !== leaverId && !p.finishedRank);
    
    if (remainingPlayers.length === 1) {
        updates[`rooms/${roomId}/game/status`] = 'finished';
        updates[`rooms/${roomId}/players/${remainingPlayers[0].id}/finishedRank`] = 1;
    } else {
        if (gameState.turnState.currentTurnId === leaverId) {
            let nextPlayerId = getNextPlayerId(false, gameState.turnState.direction);
            updates[`rooms/${roomId}/game/turnState/currentTurnId`] = nextPlayerId;
            updates[`rooms/${roomId}/game/turnState/lastUpdated`] = serverTimestamp();
        }
    }

    await update(ref(db), updates);
    showToast(`🚫 اللاعب ${leaver.name} انسحب لقطع الاتصال!`);
}

        updates[`rooms/${roomId}/players/${targetId}/handCount`] = targetHand.length;
        
        updates[`rooms/${roomId}/game/toastMessage`] = { 
            msg: `🚨 صاااده! ${targetPlayer.name} نسى يقول UNO وسحب بطاقتين!`, 
            time: Date.now() 
        };
    }

    updates[`rooms/${roomId}/game/deck`] = drawRes.deck;
    updates[`rooms/${roomId}/game/discardPile`] = drawRes.discard;
    await update(ref(db), updates);
};

let challengeResolver = null;

window.openChallengeModal = function(targetName) {
    return new Promise((resolve) => {
        const overlay = document.getElementById('challengeModal');
        document.getElementById('challengeText').innerText = `هل أنت متأكد من تقديم اعتراض ضد (${targetName})\n\n بأنه لم يضغط زر UNO؟\n\nستُعاقب بسحب بطاقة إذا كان قد ضغط الزر فعلاً!`;
        overlay.style.display = 'flex';
        challengeResolver = resolve;
    });
};

window.closeChallengeModal = function(result) {
    document.getElementById('challengeModal').style.display = 'none';
    if (challengeResolver) {
        challengeResolver(result);
        challengeResolver = null;
    }
};
function formatDuration(ms) {
    if (!ms) return "~";
    const totalSeconds = Math.floor(ms / 1000);
    const mins = Math.floor(totalSeconds / 60);
    const secs = totalSeconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function calculateHandPoints(hand) {
    let total = 0;
    if (!hand || !Array.isArray(hand)) return 0;
    
    hand.forEach(cardStr => {
        const c = parseCard(cardStr);
        // الأوراق الخاصة والماسح و +4 تعطي 50 نقطة
        if (c.isWild || c.isEraser || cardStr.includes("wild")) {
            total += 50;
        } 
        // أوراق الأكشن (تخطي، عكس، +2) تعطي 20 نقطة
        else if (["⊘", "↻", "+2"].includes(c.value)) {
            total += 20;
        } 
        // الأرقام العادية من 0-9
        else if (!isNaN(parseInt(c.value))) {
            total += parseInt(c.value);
        }
    });
    return total;
}

let leaderboardInterval = null; 

window.showLeaderboard = function() {
    const modal = document.getElementById('leaderboardModal');
    const tbody = document.getElementById('leaderboardBody');
    const headers = document.getElementById('leaderboardHeaders');
    const systemTypeElement = document.getElementById('leaderboardSystemType');
    
    const isPointsMode = roomSettings.points === true;
    let sortedPlayers = [...activePlayersList];
    tbody.innerHTML = '';

    const rankNames = ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس", "السابع", "الثامن", "التاسع", "العاشر"];

    if (isPointsMode) {
        // --- نظام النقاط (يبقى كما هو مع استبدال Moves بـ النقاط) ---
        systemTypeElement.innerText = "نظام الفوز: النقاط";
        headers.innerHTML = `<th>الترتيب</th><th>اللاعب</th><th>النقاط</th>`;
        
        sortedPlayers.forEach(p => {
            const serverPlayer = playersData[p.id];
            p.points = calculateHandPoints(serverPlayer ? serverPlayer.hand : []);
        });
        
        sortedPlayers.sort((a, b) => a.points - b.points);
        
        sortedPlayers.forEach((p, idx) => {
            const isMe = p.id === playerId;
            const isLeaver = playersData[p.id]?.isLeaver;
            const rowClass = isMe ? 'is-me-row' : (isLeaver ? 'is-leaver-row' : '');
            const rankText = isLeaver ? 'منسحب' : (rankNames[idx] || (idx + 1));
            
            tbody.innerHTML += `
                <tr class="${rowClass}">
                    <td>${rankText}</td>
                    <td>${p.name}${isMe ? ' (أنت)' : ''}</td>
                    <td>${isLeaver ? '--' : p.points}</td>
                </tr>`;
        });

} else {
        // --- النظام التتابعي ---
        systemTypeElement.innerText = "نظام الفوز: التتابعي";
        headers.innerHTML = `<th>الترتيب</th><th>اللاعب</th><th>المدة</th>`;
        
        // نستخدم playersData مباشرة لضمان أحدث القيم من السيرفر
        sortedPlayers = activePlayersList.map(p => ({
            ...p,
            finRank: playersData[p.id]?.finishedRank || 999,
            finishTime: playersData[p.id]?.finishTime || null
        }));

        sortedPlayers.sort((a, b) => a.finRank - b.finRank);
        
        sortedPlayers.forEach((p, idx) => {
            const isMe = p.id === playerId;
            const isLeaver = playersData[p.id]?.isLeaver;
            const rowClass = isMe ? 'is-me-row' : (isLeaver ? 'is-leaver-row' : '');
            
            let timeDisplayText = "~"; 
            if (isLeaver) {
                timeDisplayText = "انسحاب";
            } else if (p.finishTime) {
                timeDisplayText = formatDuration(p.finishTime);
            }

            const rankText = isLeaver ? 'مطرود' : (rankNames[idx] || (idx + 1));

            tbody.innerHTML += `
                <tr class="${rowClass}">
                    <td>${rankText}</td>
                    <td>${p.name}${isMe ? ' (أنت)' : ''}</td>
                    <td style="font-family: monospace; font-weight: bold;">${timeDisplayText}</td>
                </tr>`;
        });
    }
    
    modal.style.display = 'flex';
        
    let timeLeft = 10;
    const timerBar = document.getElementById('timer-bar');
    const countdownText = document.getElementById('countdown-text');
    const totalOffset = 176;

    if (timerBar) timerBar.style.strokeDashoffset = 0;
    if (countdownText) countdownText.innerText = timeLeft;

    if (leaderboardInterval) clearInterval(leaderboardInterval);

    leaderboardInterval = setInterval(async () => {
        timeLeft--;
        if (countdownText) countdownText.innerText = timeLeft;
        if (timerBar) {
            timerBar.style.strokeDashoffset = totalOffset - (timeLeft * (totalOffset / 10));
        }
        
        if (timeLeft <= 0) {
            clearInterval(leaderboardInterval);
            await handleAutoTransition();
        }
    }, 1000);
};

async function handleAutoTransition() {
    if (!playersData || !playersData[playerId]) return;

    const playerList = Object.values(playersData).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
    const isAdmin = (playerList.length > 0 && playerId === playerList[0].id);

    const playerUpdates = {
        [`rooms/${roomId}/players/${playerId}/team`]: "spectators-list",
        [`rooms/${roomId}/players/${playerId}/hand`]: null,
        [`rooms/${roomId}/players/${playerId}/handCount`]: null,
        [`rooms/${roomId}/players/${playerId}/finishedRank`]: null,
        [`rooms/${roomId}/players/${playerId}/saidUno`]: null,
        [`rooms/${roomId}/players/${playerId}/movesCount`]: null
    };
    await update(ref(db), playerUpdates);

    if (isAdmin) {
        const roomUpdates = {
            [`rooms/${roomId}/status`]: "lobby",
            [`rooms/${roomId}/game/status`]: null,
            [`rooms/${roomId}/game/turnState`]: null,
            [`rooms/${roomId}/game/discardPile`]: null,
            [`rooms/${roomId}/game/deck`]: null
        };
        await update(ref(db), roomUpdates);
    }

    window.location.href = `lobby.html?r=${roomId}&p=${playerId}`;
}
