<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO! Pro - الرئيسية</title>
    <style>
        :root {
            --bg-dark: #050505; 
            --panel-bg: #121212; 
            --orange-gradient: linear-gradient(135deg, #ffaa00 0%, #ff5500 100%);
            --uno-yellow: #ffaa00;
            --text-gray: #888888;
            --mobile-max-width: 450px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg-dark); color: white; 
            display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; 
        }

        .mobile-wrapper {
            width: 100%; max-width: var(--mobile-max-width); height: 100dvh; background: #000;
            display: flex; flex-direction: column; border-left: 1px solid #333; border-right: 1px solid #333;
            position: relative; overflow-y: auto; padding: 20px;
        }

        /* --- Logo & Header --- */
        .header-logo {
            text-align: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 30px;
            color: transparent; background: var(--orange-gradient); -webkit-background-clip: text; background-clip: text;
        }

        /* --- Sections (Cards) --- */
        .section-card {
            background: var(--panel-bg); border: 1px solid #333; border-radius: 15px; 
            padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .section-title { font-size: 1rem; font-weight: bold; margin-bottom: 15px; color: #ddd; }

        /* --- Inputs & Buttons --- */
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-text {
            flex: 1; background: #1a1a1a; border: 1px solid #444; color: white; 
            padding: 12px; border-radius: 10px; font-size: 1rem; outline: none; text-align: center;
        }
        .input-text:focus { border-color: var(--uno-yellow); }

        .btn-action, .btn-outline {
            width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; 
            cursor: pointer; font-size: 1.1rem; transition: 0.2s; border: none;
        }
        
        .btn-action {
            background: var(--orange-gradient); color: white;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.2);
        }
        .btn-action:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-outline {
            background: transparent; color: var(--uno-yellow); border: 2px solid var(--uno-yellow);
        }

        .icon-btn {
            background: #222; border: 1px solid #444; color: white; border-radius: 10px;
            padding: 0 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* --- Radio Options --- */
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; justify-content: center; }
        .radio-label {
            display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 0.9rem; color: #ccc;
        }
        .radio-label input[type="radio"] { accent-color: var(--uno-yellow); }

        /* --- Rooms Table --- */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: center; }
        th { padding: 10px; color: var(--text-gray); border-bottom: 1px solid #333; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; vertical-align: middle; }
        tr:hover td { background: rgba(255, 170, 0, 0.05); }
        .room-id { font-weight: bold; color: var(--uno-yellow); font-family: monospace; font-size: 1rem; }
        
        .status-badge {
            padding: 4px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: bold;
        }
        .status-lobby { background: rgba(255, 170, 0, 0.1); color: var(--uno-yellow); border: 1px solid var(--uno-yellow); }
        .status-game { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }

        /* --- Toast Messages --- */
        #toastContainer {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 9999;
        }
        .toast-msg {
            background: #222; border: 1px solid var(--uno-yellow); color: white;
            padding: 10px 20px; border-radius: 8px; font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); animation: fadeInOut 4s forwards;
        }

        /* --- Session Recovery FAB --- */
        #reconnectFab {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; border: 2px solid var(--uno-yellow); border-radius: 30px;
            padding: 10px 20px; cursor: pointer; color: white; display: none; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); font-weight: bold; font-size: 0.9rem;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        /* --- تعديل الحاوية لمنع السكرول الكلي --- */
.mobile-wrapper {
    width: 100%; 
    max-width: var(--mobile-max-width); 
    height: 100dvh; 
    background: #000;
    display: flex; 
    flex-direction: column; 
    border-left: 1px solid #333; 
    border-right: 1px solid #333;
    position: relative; 
    overflow: hidden; /* تم تغييرها من auto إلى hidden */
    padding: 20px;
}

/* --- تعديل حاوية الجدول لتصبح قابلة للتمرير --- */
/* ابحث عن الكارد الأخير وقم بتعديله أو أضف هذا التنسيق */
.rooms-container {
    flex: 1;
    overflow-y: auto; /* تفعيل السكرول هنا فقط */
    margin-top: 10px;
    scrollbar-width: thin; /* لشكل سكرول أنحف في فايرفوكس */
}

/* --- تثبيت رأس الجدول --- */
table thead th {
    position: sticky;
    top: 0;
    background: var(--panel-bg); /* نفس لون خلفية الكارد */
    z-index: 10;
    box-shadow: 0 2px 2px -1px rgba(0,0,0,0.4); /* ظل بسيط لفصله عن المحتوى */
}
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div id="reconnectFab" onclick="recoverSession()">
    🔄 العودة للغرفة السابقة: <span id="reconnectRoomId" style="color:var(--uno-yellow)"></span>
</div>

<div class="mobile-wrapper">
    
    <div class="header-logo">UNO! PRO</div>

    <div class="section-card">
        <div class="section-title">الانضمام إلى غرفة</div>
        <div class="input-group">
            <input type="text" id="joinIdInput" class="input-text" placeholder="رمز الغرفة (مثال: A1B2C3)" maxlength="15">
            <button id="pasteBtn" class="icon-btn" title="لصق">📋</button>
        </div>
        <button class="btn-action" onclick="joinRoom()">انضمام</button>
    </div>

    <div class="section-card">
        <div class="section-title">إنشاء غرفة جديدة</div>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="roomType" value="public" checked> عامة
            </label>
            <label class="radio-label">
                <input type="radio" name="roomType" value="private"> خاصة
            </label>
        </div>
        <button class="btn-outline" onclick="createRoom()">إنشاء غرفة</button>
    </div>

    <div class="section-card" style="padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        <div class="section-title" style="padding: 10px; margin-bottom: 0;">الجلسات المفتوحة مؤخراً</div>
        
        <div class="rooms-container">
            <table>
                <thead>
                    <tr>
                        <th>الرمز</th>
                        <th>اللاعبين</th>
                        <th>النظام</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="roomsListBody">
                    <tr><td colspan="4" style="text-align:center; padding:20px; color:#888;">جاري جلب الغرف...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, child, set, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAiQtfrXCU_Z3-N_UczLWXJKff4QJ5pGFY",
        authDomain: "uno-4ed20.firebaseapp.com",
        databaseURL: "https://uno-4ed20-default-rtdb.firebaseio.com",
        projectId: "uno-4ed20"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const joinInput = document.getElementById('joinIdInput');
    const joinBtn = document.querySelector('.btn-action');

    window.showToast = function(msg) {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    };

    // --- 1. Session Recovery ---
    const savedRoom = localStorage.getItem('uno_active_room');
    if (savedRoom) {
        document.getElementById('reconnectRoomId').innerText = savedRoom;
        document.getElementById('reconnectFab').style.display = 'block';
    }
    window.recoverSession = () => {
        if(savedRoom) location.href = `lobby.html?r=${savedRoom}`;
    };

    // --- 2. Smart Paste ---
    document.getElementById('pasteBtn').addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            if (text) {
                let value = text.trim().toUpperCase();
                if (value.includes('?R=')) { 
                    try {
                        const urlParams = new URLSearchParams(value.split('?')[1]);
                        value = (urlParams.get('R') || urlParams.get('r') || "").toUpperCase();
                    } catch (e) {}
                }
                joinInput.value = value;
                showToast("✅ تم اللصق بنجاح");
            }
        } catch (err) {
            showToast("⚠️ يرجى إعطاء صلاحية الوصول للحافظة أو قم باللصق يدوياً");
        }
    });

    joinInput.addEventListener('input', (e) => {
        let value = e.target.value.trim().toUpperCase();
        if (value.includes('?R=')) { 
            try {
                const urlParams = new URLSearchParams(value.split('?')[1]);
                const roomCode = urlParams.get('R') || urlParams.get('r');
                if (roomCode) value = roomCode.toUpperCase();
            } catch (err) {}
        }
        e.target.value = value;
    });

    window.joinRoom = async () => {
        const val = joinInput.value.trim().toUpperCase();
        if (!val) { showToast("⚠️ يرجى إدخال رمز الغرفة أولاً"); return; }

        joinBtn.disabled = true;
        const originalText = joinBtn.innerText;
        joinBtn.innerText = "جاري الاتصال...";

        try {
            const snapshot = await get(child(ref(db), `rooms/${val}`));
            if (snapshot.exists()) {
                location.href = `lobby.html?r=${val}`;
            } else {
                showToast("⚠️ عذراً، رمز الغرفة غير موجود. تأكد من الرمز.");
                joinBtn.disabled = false; joinBtn.innerText = originalText;
            }
        } catch (error) {
            showToast("❌ حدث خطأ في الاتصال");
            joinBtn.disabled = false; joinBtn.innerText = originalText;
        }
    };

    window.createRoom = async () => {
        const dbRef = ref(db);
        let newId = "";
        let isUnique = false;

        const createBtn = document.querySelector('.btn-outline');
        createBtn.innerText = "جاري الحجز...";
        createBtn.disabled = true;

        while (!isUnique) {
            newId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const snapshot = await get(child(dbRef, `rooms/${newId}`));
            if (!snapshot.exists()) isUnique = true;
        }

        const selectedType = document.querySelector('input[name="roomType"]:checked').value;

        try {
            await set(ref(db, `rooms/${newId}/settings`), {
                visibility: selectedType,
                points: false,
                createdAt: Date.now() 
            });
            location.href = `lobby.html?r=${newId}&type=${selectedType}`;
        } catch (e) {
            showToast("❌ فشل إنشاء الغرفة");
            createBtn.disabled = false; createBtn.innerText = "إنشاء غرفة";
        }
    };

    // --- 3. Shallow Query for Room List ---
    const roomsQuery = query(ref(db, 'rooms'), orderByChild('settings/createdAt'), limitToLast(20));
    
    onValue(roomsQuery, (snapshot) => {
        const rooms = snapshot.val();
        const tbody = document.getElementById('roomsListBody');
        tbody.innerHTML = ''; 

        if (!rooms) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:#444;">لا توجد جلسات مفتوحة</td></tr>';
            return;
        }

        const roomsArray = Object.entries(rooms).reverse();
        let hasVisibleRooms = false;

        roomsArray.forEach(([id, room]) => {
            const isPublic = room.settings && room.settings.visibility === 'public';
            if (!isPublic) return;

            // 2. التحقق من وجود لاعبين (تجنب الغرف المهجورة)
            const playersCount = room.players ? Object.keys(room.players).length : 0;
            if (playersCount === 0) return;

            hasVisibleRooms = true;
            const isPointsMode = room.settings?.points === true;
            const gameSystem = isPointsMode ? 'نقاط 🏆' : 'تتابعي 🏁';
            const inGame = room.status === 'started';

            const tr = document.createElement('tr');
            tr.style.cursor = 'pointer';
            tr.onclick = () => location.href = `lobby.html?r=${id}`;
            tr.innerHTML = `
                <td class="room-id">${id.toUpperCase()}</td>
                <td style="color:#ddd;">👤 ${playersCount}/10</td>
                <td style="color:#aaa; font-size: 0.8rem;">${gameSystem}</td>
                <td>
                    <span class="status-badge ${inGame ? 'status-game' : 'status-lobby'}">
                        ${inGame ? 'جاري اللعب 🎮' : 'في الردهة ⏳'}
                    </span>
                </td>
            `;
            tbody.appendChild(tr);
        });

        if (!hasVisibleRooms) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:#444;">لا توجد غرف عامة حالياً</td></tr>';
        }
    });
</script>

</body>
</html>
