<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Online - الردهة</title>
    <style>
        /* --- Global & Root --- */
        :root {
            --bg-dark: #000000; --panel-bg: #111111; 
            --uno-red: #ff5555; --uno-blue: #5555ff; --uno-green: #55aa55; --uno-yellow: #ffaa00;
            --text-gray: #aaaaaa; --modal-bg: #1a1a1a; --mobile-max-width: 450px;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { 
            margin: 0; background-color: var(--bg-dark); color: white; 
            display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; 
        }

        /* --- Loading Screen --- */
        #loadingScreen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--uno-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Wrapper --- */
        .mobile-wrapper { width: 100%; max-width: var(--mobile-max-width); height: 100dvh; background: #000; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; position: relative; overflow: hidden; }

        /* --- Top Bar --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; flex-shrink: 0; }
        .icon-circle { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #333; cursor: pointer; }
        .btn-pill { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* --- Spectators --- */
        .spectators-section { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px; }
        .spectators-list { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; min-height: 50px; }
        .box-title { font-size: 0.7rem; font-weight: 800; color: var(--text-gray); letter-spacing: 2px; text-transform: uppercase; }

        /* --- Settings Panel (Dynamic UNO Settings) --- */
        .settings-panel { 
            background: #0a0a0a; margin: 10px; border-radius: 20px; padding: 15px; flex: 1; 
            border: 1px solid #222; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
        }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        .setting-info b { font-size: 0.8rem; display: block; color: #fff; }
        .setting-info span { font-size: 0.65rem; color: #666; }
        
        .control-group { display: flex; align-items: center; gap: 12px; background: #1a1a1a; padding: 5px 10px; border-radius: 12px; border: 1px solid #333; }
        .control-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; padding: 0 5px; }
        .control-val { font-weight: bold; min-width: 25px; text-align: center; color: var(--uno-yellow); }

        /* --- Toggle Switch --- */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--uno-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- Bottom Section (Player Slots) --- */
        .bottom-section { height: 45%; display: flex; flex-direction: column; background: #050505; border-top: 1px solid #222; }
        .teams-grid { 
            flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; 
            overflow-y: auto; align-content: start;
        }
        .player-slot { 
            height: 80px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: 0.3s;
        }
        /* تدرجات ألوان الأونو للخانات */
        .slot-0 { background: linear-gradient(135deg, #441111 0%, var(--uno-red) 100%); }
        .slot-1 { background: linear-gradient(135deg, #111144 0%, var(--uno-blue) 100%); }
        .slot-2 { background: linear-gradient(135deg, #114411 0%, var(--uno-green) 100%); }
        .slot-3 { background: linear-gradient(135deg, #443311 0%, var(--uno-yellow) 100%); }
        .slot-empty { background: #151515; border-style: dashed; }

        .join-btn-small { 
            width: 80%; padding: 5px; font-size: 0.7rem; font-weight: bold; border-radius: 10px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; cursor: pointer;
        }

        /* --- Footer --- */
        .footer { height: 80px; padding: 15px; display: flex; align-items: center; }
        .start-btn { 
            width: 100%; height: 50px; font-size: 1.2rem; font-weight: 900; color: white;
            background: linear-gradient(to bottom, var(--uno-green), #2d5a2d);
            border: 2px solid #88ff88; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 0 #1a3a1a;
            display: none;
        }

        /* --- Player Avatar Logic --- */
        .player-chip { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .avatar-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; }
        .player-name { font-size: 0.7rem; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        /* --- Modals --- */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .settings-modal { width: 90%; background: var(--modal-bg); border-radius: 25px; padding: 25px; border: 1px solid #333; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .avatar-opt { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid #444; cursor: pointer; }
        .avatar-opt.selected { border-color: var(--uno-green); transform: scale(1.1); }
    </style>
</head>
<body>

<div id="loadingScreen"><div class="spinner"></div></div>

<div class="mobile-wrapper">
    <div class="top-bar">
        <div class="top-left">
            <div class="icon-circle"><span id="totalPlayersCount">1</span>👤</div>
            <div class="btn-pill" onclick="copyLink()">🔗 <span id="roomCodeText">ROOM</span></div>
        </div>
        <div class="top-right">
            <div class="icon-circle" onclick="openProfile()">⚙️</div>
        </div>
    </div>

    <div class="spectators-section">
        <div class="box-title">الجمهور (غير مشاركين)</div>
        <div class="spectators-list" id="spectatorsList"></div>
        <button class="join-btn-small" style="width: 100px;" onclick="joinSlot('spectator')">الانسحاب للجمهور</button>
    </div>

    <div class="settings-panel" id="adminPanel">
        <div class="box-title" style="text-align: center;">إعدادات الجلسة</div>
        
        <div class="setting-item">
            <div class="setting-info"><b>أقصى عدد لاعبين</b><span>من 2 إلى 10 لاعبين</span></div>
            <div class="control-group">
                <button class="control-btn" onclick="updateSetting('maxPlayers', -1)">-</button>
                <div class="control-val" id="val-maxPlayers">2</div>
                <button class="control-btn" onclick="updateSetting('maxPlayers', 1)">+</button>
            </div>
        </div>

        <div class="setting-item">
            <div class="setting-info"><b>عدد حزم البطاقات</b><span>الحزمة الواحدة 108 ورقة</span></div>
            <div class="control-group">
                <button class="control-btn" onclick="updateSetting('decks', -1)">-</button>
                <div class="control-val" id="val-decks">1</div>
                <button class="control-btn" onclick="updateSetting('decks', 1)">+</button>
            </div>
        </div>

        <div class="setting-item">
            <div class="setting-info"><b>بطاقات البداية</b><span>توزع لكل لاعب عند البدء</span></div>
            <div class="control-group">
                <button class="control-btn" onclick="updateSetting('startCards', -1)">-</button>
                <div class="control-val" id="val-startCards">7</div>
                <button class="control-btn" onclick="updateSetting('startCards', 1)">+</button>
            </div>
        </div>

        <div class="setting-item">
            <div class="setting-info"><b>قانون التراكم (Stacking)</b><span>سحب 2 و 4 تراكمي</span></div>
            <label class="switch">
                <input type="checkbox" id="stackingToggle" checked onchange="updateToggle('stacking', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <div class="setting-info"><b>المؤقت لكل دور</b><span>تلقائي عند انتهاء الوقت</span></div>
            <div class="control-group">
                <button class="control-btn" onclick="updateTimerSetting(-1)">-</button>
                <div class="control-val" id="val-timer">🚫</div>
                <button class="control-btn" onclick="updateTimerSetting(1)">+</button>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="box-title" style="padding: 10px 15px 0 15px;">المشاركين في اللعب</div>
        <div class="teams-grid" id="playerSlotsGrid">
            </div>
        <div class="footer">
            <button class="start-btn" id="startBtn" onclick="startGame()">ابدأ اللعب الآن 🚀</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="profileModal">
    <div class="settings-modal">
        <div class="box-title" style="margin-bottom: 15px;">إعدادات ملفك</div>
        <div class="avatar-grid" id="avatarGrid"></div>
        <input type="text" id="nickInput" class="nickname-input" style="width:100%; padding:12px; background:#111; border:1px solid #333; color:white; border-radius:12px;" placeholder="لقبك في اللعبة...">
        <button class="save-btn" style="width:100%; padding:15px; margin-top:20px; background:var(--uno-blue); border:none; border-radius:12px; color:white; font-weight:bold;" onclick="saveProfile()">حفظ التعديلات</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAiQtfrXCU_Z3-N_UczLWXJKff4QJ5pGFY",
        authDomain: "uno-4ed20.firebaseapp.com",
        databaseURL: "https://uno-4ed20-default-rtdb.firebaseio.com",
        projectId: "uno-4ed20",
        appId: "1:246636486248:web:aaab01dccbb45dd9b665dd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // متغيرات الحالة
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('r') || 'test';
    const myId = localStorage.getItem('uno_player_id') || Math.random().toString(36).substring(2, 9);
    localStorage.setItem('uno_player_id', myId);

    let currentSettings = { maxPlayers: 2, decks: 1, startCards: 7, stacking: true, timer: 0 };
    let isAdmin = false;

    // --- تحديث الواجهة (Slots) ---
    function renderSlots(players, max) {
        const grid = document.getElementById('playerSlotsGrid');
        grid.innerHTML = '';
        
        for (let i = 0; i < max; i++) {
            const slot = document.createElement('div');
            const playerInSlot = Object.values(players || {}).find(p => p.slot === i);
            
            if (playerInSlot) {
                slot.className = `player-slot slot-${i % 4}`;
                slot.innerHTML = `
                    <div class="player-chip">
                        <img src="img/avatars/${playerInSlot.avatar}.webp" class="avatar-img">
                        <span class="player-name">${playerInSlot.name} ${playerInSlot.isAdmin ? '👑' : ''}</span>
                    </div>
                `;
            } else {
                slot.className = `player-slot slot-empty`;
                slot.innerHTML = `<button class="join-btn-small" onclick="joinSlot(${i})">انضمام</button>`;
            }
            grid.appendChild(slot);
        }
    }

    // --- Firebase Sync ---
    const roomRef = ref(db, `rooms/${roomId}`);
    onValue(roomRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            // تهيئة غرفة جديدة إذا كانت فارغة
            initializeRoom();
            return;
        }

        document.getElementById('loadingScreen').style.display = 'none';
        currentSettings = data.settings || currentSettings;
        isAdmin = data.players?.[myId]?.isAdmin || false;

        // تحديث أرقام الإعدادات
        document.getElementById('val-maxPlayers').innerText = currentSettings.maxPlayers;
        document.getElementById('val-decks').innerText = currentSettings.decks;
        document.getElementById('val-startCards').innerText = currentSettings.startCards;
        document.getElementById('stackingToggle').checked = currentSettings.stacking;
        
        const timerTexts = ['🚫', '30ث', '1د', '2د'];
        document.getElementById('val-timer').innerText = timerTexts[currentSettings.timer];

        // إظهار/إخفاء لوحة التحكم للآدمن
        document.getElementById('adminPanel').style.opacity = isAdmin ? '1' : '0.5';
        document.getElementById('adminPanel').style.pointerEvents = isAdmin ? 'auto' : 'none';
        document.getElementById('startBtn').style.display = isAdmin ? 'block' : 'none';

        // رندر اللاعبين والجمهور
        const players = data.players || {};
        renderSlots(players, currentSettings.maxPlayers);
        
        const spectators = Object.values(players).filter(p => p.slot === 'spectator');
        document.getElementById('spectatorsList').innerHTML = spectators.map(p => `
            <img src="img/avatars/${p.avatar}.webp" class="avatar-img" style="width:30px;height:30px;opacity:0.6" title="${p.name}">
        `).join('');
        
        document.getElementById('totalPlayersCount').innerText = Object.keys(players).length;
        document.getElementById('roomCodeText').innerText = roomId.toUpperCase();
    });

    async function initializeRoom() {
        await set(roomRef, {
            status: 'lobby',
            settings: currentSettings,
            players: {
                [myId]: { name: "لاعب جديد", avatar: "1", slot: "spectator", isAdmin: true }
            }
        });
    }

    // --- وظائف التحكم ---
    window.updateSetting = (key, delta) => {
        if (!isAdmin) return;
        let val = currentSettings[key] + delta;
        if (key === 'maxPlayers') val = Math.max(2, Math.min(10, val));
        if (key === 'decks') val = Math.max(1, Math.min(3, val));
        if (key === 'startCards') val = Math.max(5, Math.min(15, val));
        
        // عند تغيير عدد اللاعبين، يفضل نقل الكل للجمهور كما طلبت لمنع الأخطاء
        if (key === 'maxPlayers') {
            const updates = {};
            updates[`rooms/${roomId}/settings/maxPlayers`] = val;
            // منطق نقل اللاعبين للجمهور يمكن إضافته هنا
            update(ref(db), updates);
        } else {
            update(ref(db, `rooms/${roomId}/settings`), { [key]: val });
        }
    };

    window.joinSlot = (slotIdx) => {
        update(ref(db, `rooms/${roomId}/players/${myId}`), { slot: slotIdx });
    };

    window.copyLink = () => {
        navigator.clipboard.writeText(window.location.href);
        alert("تم نسخ رابط الغرفة!");
    };

    // (بقية الدوال مثل saveProfile و updateTimerSetting ستكمل منطق الربط)
</script>
</body>
</html>
